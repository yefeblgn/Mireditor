<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mireditor</title>
    <style>
        @font-face {
            font-family: 'LEMON MILK';
            font-weight: 400;
            src: url('./src/fonts/LemonMilk-Regular.woff') format('woff');
        }
        @font-face {
            font-family: 'LEMON MILK';
            font-weight: 300;
            src: url('./src/fonts/LemonMilk-Light.woff') format('woff');
        }
        @font-face {
            font-family: 'LEMON MILK';
            font-weight: 500;
            src: url('./src/fonts/LemonMilk-Medium.woff') format('woff');
        }
        @font-face {
            font-family: 'LEMON MILK';
            font-weight: 700;
            src: url('./src/fonts/LemonMilk-Bold.woff') format('woff');
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f0f0f;
            font-family: 'LEMON MILK', sans-serif;
        }
        .main-wrapper {
            width: 100%;
            height: 100%;
            background: #0f0f0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-app-region: drag;
            position: relative;
        }
        .container {
            text-align: center;
            width: 80%;
            max-width: 340px;
        }
        .logo-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo {
            width: 110px;
            height: 110px;
            animation: logo-spin 3.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
            background-image: url('assets/icon-nobg.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        @keyframes logo-spin {
            0% { transform: rotate(0deg); }
            35% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .app-name {
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* ─── Tek satır status ─── */
        .status-text {
            color: #555;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 14px;
            height: 14px;
            transition: opacity 0.3s ease;
        }
        .status-text.fade {
            opacity: 0;
        }

        /* ─── Progress bar ─── */
        .progress-container {
            width: 100%;
            height: 2px;
            background: #1a1a1a;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            box-shadow: 0 0 10px rgba(59,130,246,0.4);
            transition: width 0.5s cubic-bezier(0.1, 0.7, 0.1, 1);
        }
        .progress-bar.complete {
            background: linear-gradient(90deg, #22c55e, #4ade80);
            box-shadow: 0 0 10px rgba(34,197,94,0.4);
        }
        .progress-bar.updating {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            box-shadow: 0 0 10px rgba(245,158,11,0.4);
        }

        .version {
            position: absolute;
            bottom: 14px;
            color: #2a2a2a;
            font-size: 8px;
            letter-spacing: 2px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* ─── Update Log Panel ─── */
        .update-log {
            width: 100%;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease, margin-top 0.3s ease;
            opacity: 0;
            margin-top: 0;
        }
        .update-log.visible {
            max-height: 120px;
            opacity: 1;
            margin-top: 12px;
        }
        .update-log-inner {
            background: rgba(0,0,0,0.4);
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            max-height: 110px;
            overflow-y: auto;
            padding: 6px 8px;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }
        .update-log-inner::-webkit-scrollbar { width: 4px; }
        .update-log-inner::-webkit-scrollbar-track { background: transparent; }
        .update-log-inner::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .log-entry {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            padding: 2px 0;
            font-family: 'LEMON MILK', monospace;
        }
        .log-time {
            color: #333;
            font-size: 7px;
            letter-spacing: 1px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .log-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 3px;
        }
        .log-dot.info { background: #3b82f6; }
        .log-dot.success { background: #22c55e; }
        .log-dot.warn { background: #f59e0b; }
        .log-dot.error { background: #ef4444; }
        .log-msg {
            color: #666;
            font-size: 8px;
            letter-spacing: 0.5px;
            line-height: 1.3;
            word-break: break-word;
        }
        .log-msg.success { color: #4ade80; }
        .log-msg.error { color: #f87171; }
        .log-msg.warn { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="container">
            <div class="logo-container">
                <div class="logo"></div>
            </div>
            <div class="app-name">Mireditor</div>
            <div class="status-text" id="status">Başlatılıyor...</div>
            <div class="progress-container">
                <div class="progress-bar" id="bar"></div>
            </div>
            <div class="update-log" id="updateLog">
                <div class="update-log-inner" id="updateLogInner"></div>
            </div>
        </div>
        <div class="version">v0.0.4</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const progressBar = document.getElementById('bar');
        const updateLogEl = document.getElementById('updateLog');
        const updateLogInner = document.getElementById('updateLogInner');

        function setStatus(text) {
            statusEl.classList.add('fade');
            setTimeout(() => {
                statusEl.textContent = text;
                statusEl.classList.remove('fade');
            }, 150);
        }

        function setProgress(percent) {
            progressBar.style.width = percent + '%';
            if (percent >= 100) {
                progressBar.classList.add('complete');
            }
        }

        function addLogEntry(message, type, time) {
            // Show the log panel
            updateLogEl.classList.add('visible');

            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <span class="log-time">${time || ''}</span>
                <span class="log-dot ${type || 'info'}"></span>
                <span class="log-msg ${type || ''}">${message}</span>
            `;
            updateLogInner.appendChild(entry);
            // Auto-scroll to bottom
            updateLogInner.scrollTop = updateLogInner.scrollHeight;
        }

        if (window.splashAPI) {
            window.splashAPI.onStatus((data) => {
                setStatus(data.text);
                if (data.text && data.text.includes('indiriliyor')) {
                    progressBar.classList.add('updating');
                    progressBar.classList.remove('complete');
                } else if (data.text && data.text.includes('uygulanıyor')) {
                    progressBar.classList.add('updating');
                    progressBar.classList.remove('complete');
                } else {
                    progressBar.classList.remove('updating');
                }
            });
            window.splashAPI.onProgress((data) => {
                setProgress(data.percent);
            });
            window.splashAPI.onReady(() => {
                setStatus('Hazır');
                setProgress(100);
            });
            window.splashAPI.onUpdateLog((data) => {
                addLogEntry(data.message, data.type, data.time);
            });
        } else {
            let p = 0;
            const interval = setInterval(() => {
                p += 0.4;
                setProgress(Math.min(p, 95));
                if (p >= 95) clearInterval(interval);
            }, 30);
        }
    </script>
</body>
</html>
